<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Approval — YOUR_APP_NAME</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #2a1f23;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #faf9f6;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(42,31,35,0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    .icon.success { background: #dcfce7; color: #16a34a; }
    .icon.error { background: #fee2e2; color: #dc2626; }
    .icon.warning { background: #fef3c7; color: #d97706; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .message { font-size: 15px; line-height: 1.6; color: #555; }
    .message strong { color: #2a1f23; }
    .auto-approve-note {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fef3c7;
      border-left: 4px solid #d97706;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #92400e;
      text-align: left;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #7d6f74;
    }
    .logo {
      margin-bottom: 24px;
    }
    .logo img { height: 32px; vertical-align: middle; }
    .logo img + img { margin-left: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="YOUR_SUPABASE_URL/storage/v1/object/public/housephotos/logos/logo-black-transparent.png" alt="" style="height:32px;">
      <img src="YOUR_SUPABASE_URL/storage/v1/object/public/housephotos/logos/wordmark-black-transparent.png" alt="YOUR_PROPERTY_NAME" style="height:20px;">
    </div>
    <div id="icon" class="icon success">&#10003;</div>
    <h1 id="title">Processing...</h1>
    <div id="message" class="message">Please wait.</div>
    <div id="auto-note" class="auto-approve-note" style="display:none;"></div>
    <div id="type-approval-offer" style="display:none; margin-top: 20px;">
      <p style="font-size: 14px; color: #555; margin-bottom: 12px;">Want to skip approval for all future emails of this type?</p>
      <a id="type-approval-btn" href="#" style="display: inline-block; padding: 12px 28px; background: #d4883a; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 14px;">Auto-Approve <span id="type-label-btn"></span></a>
      <p style="font-size: 12px; color: #7d6f74; margin-top: 8px;">This permanently disables approval for this email type.</p>
    </div>
    <p class="footer">YOUR_APP_NAME Email Approval System</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status') || 'error';
    const title = decodeURIComponent(params.get('title') || 'Unknown');
    const message = decodeURIComponent(params.get('message') || '');
    const autoApproveType = params.get('auto_type');

    const iconEl = document.getElementById('icon');
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const autoNote = document.getElementById('auto-note');

    titleEl.textContent = '';
    titleEl.innerHTML = title;

    messageEl.innerHTML = message;

    if (status === 'success') {
      iconEl.className = 'icon success';
      iconEl.innerHTML = '&#10003;';
    } else if (status === 'warning') {
      iconEl.className = 'icon warning';
      iconEl.innerHTML = '&#9888;';
    } else {
      iconEl.className = 'icon error';
      iconEl.innerHTML = '&#10007;';
    }

    if (autoApproveType) {
      autoNote.style.display = 'block';
      autoNote.innerHTML = 'All future <strong>' + autoApproveType + '</strong> emails will now send automatically without approval.';
    }

    // Show "Auto-Approve Type" button when email was already processed
    if (params.get('offer_type_approval') === '1') {
      const approvalToken = params.get('approval_token');
      const typeLabel = params.get('email_type_label') || 'this type';
      const offer = document.getElementById('type-approval-offer');
      const btn = document.getElementById('type-approval-btn');
      const labelSpan = document.getElementById('type-label-btn');
      offer.style.display = 'block';
      labelSpan.textContent = typeLabel;
      const base = 'YOUR_SUPABASE_URL/functions/v1/approve-email';
      btn.href = base + '?token=' + encodeURIComponent(approvalToken) + '&action=approve_all&confirm=1';
    }
  </script>
</body>
</html>
