<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Blue Morpho butterfly">
  <defs>
    <radialGradient id="morpho" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0%" stop-color="#A6DEFF"/>
      <stop offset="25%" stop-color="#4FA0E8"/>
      <stop offset="55%" stop-color="#1F66BB"/>
      <stop offset="85%" stop-color="#0E3375"/>
      <stop offset="100%" stop-color="#081A40"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="body" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1E1610"/>
      <stop offset="50%" stop-color="#2C2118"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </linearGradient>
  </defs>

  <!-- LEFT FOREWING -->
  <path id="fwL" d="M32 25 C 26 16, 18 8, 10 6 C 3 6, 1 16, 3 23 C 7 29, 18 30, 32 28 Z"
        fill="url(#morpho)" stroke="#091732" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M32 25 C 26 16, 18 8, 10 6 C 3 6, 1 16, 3 23 C 7 29, 18 30, 32 28 Z" fill="url(#shimmer)"/>

  <!-- RIGHT FOREWING (mirrored) -->
  <path d="M32 25 C 38 16, 46 8, 54 6 C 61 6, 63 16, 61 23 C 57 29, 46 30, 32 28 Z"
        fill="url(#morpho)" stroke="#091732" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M32 25 C 38 16, 46 8, 54 6 C 61 6, 63 16, 61 23 C 57 29, 46 30, 32 28 Z"
        fill="url(#shimmer)" transform="translate(64,0) scale(-1,1)"/>

  <!-- LEFT HINDWING -->
  <path d="M32 30 C 24 32, 14 38, 10 48 C 11 56, 21 58, 28 54 C 32 48, 32 38, 32 32 Z"
        fill="url(#morpho)" stroke="#091732" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- RIGHT HINDWING -->
  <path d="M32 30 C 40 32, 50 38, 54 48 C 53 56, 43 58, 36 54 C 32 48, 32 38, 32 32 Z"
        fill="url(#morpho)" stroke="#091732" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Wing veins, radial from body -->
  <g stroke="#0A1F47" stroke-width="0.4" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M30 25 L 11 9"/>
    <path d="M29 26 L 5 16"/>
    <path d="M29 27 L 4 22"/>
    <path d="M34 25 L 53 9"/>
    <path d="M35 26 L 59 16"/>
    <path d="M35 27 L 60 22"/>
    <path d="M30 31 L 14 44"/>
    <path d="M30 32 L 20 54"/>
    <path d="M34 31 L 50 44"/>
    <path d="M34 32 L 44 54"/>
  </g>

  <!-- White edge marks (peleides-style) -->
  <g fill="#F5EFDF" opacity="0.85">
    <circle cx="6" cy="10" r="0.7"/>
    <circle cx="3" cy="16" r="0.6"/>
    <circle cx="58" cy="10" r="0.7"/>
    <circle cx="61" cy="16" r="0.6"/>
    <circle cx="12" cy="50" r="0.55"/>
    <circle cx="52" cy="50" r="0.55"/>
  </g>

  <!-- Body: thorax -->
  <ellipse cx="32" cy="28" rx="2.4" ry="6.5" fill="url(#body)"/>
  <!-- Abdomen -->
  <ellipse cx="32" cy="44" rx="1.6" ry="10" fill="url(#body)"/>
  <!-- Subtle abdomen segments -->
  <g stroke="#000" stroke-width="0.3" opacity="0.45" stroke-linecap="round">
    <line x1="30.6" y1="38" x2="33.4" y2="38"/>
    <line x1="30.6" y1="42" x2="33.4" y2="42"/>
    <line x1="30.6" y1="46" x2="33.4" y2="46"/>
    <line x1="30.7" y1="50" x2="33.3" y2="50"/>
  </g>
  <!-- Head -->
  <circle cx="32" cy="22" r="2.2" fill="#0A0604"/>
  <!-- Eyes (tiny glints) -->
  <circle cx="30.8" cy="21.4" r="0.45" fill="#3A2E20" opacity="0.7"/>
  <circle cx="33.2" cy="21.4" r="0.45" fill="#3A2E20" opacity="0.7"/>

  <!-- Antennae with clubbed tips -->
  <g stroke="#0A0604" stroke-width="0.95" stroke-linecap="round" fill="#0A0604">
    <path d="M30.5 21 Q 26.5 13 22 9" fill="none"/>
    <path d="M33.5 21 Q 37.5 13 42 9" fill="none"/>
    <ellipse cx="22" cy="9" rx="1.3" ry="0.85" transform="rotate(-32 22 9)"/>
    <ellipse cx="42" cy="9" rx="1.3" ry="0.85" transform="rotate(32 42 9)"/>
  </g>
</svg>
