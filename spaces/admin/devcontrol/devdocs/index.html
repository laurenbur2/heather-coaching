<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Docs — AlpacApps</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/styles/site.css">
    <link rel="stylesheet" href="/styles/tailwind.out.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf9f6;
            color: #1c1618;
            min-height: 100vh;
            padding: 2rem 1.5rem 4rem;
        }
        .container { max-width: 720px; margin: 0 auto; }
        .header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.5rem; }
        h1 { font-size: 1.75rem; font-weight: 700; color: #1c1618; }
        .back-link { font-size: 0.85rem; color: #8a7f76; text-decoration: none; }
        .back-link:hover { color: #d4883a; }
        .subtitle { font-size: 0.85rem; color: #8a7f76; margin-bottom: 1.5rem; }
        .search-box {
            display: flex; align-items: center; gap: 0.5rem;
            background: #fff; border: 1px solid #e8e4df; border-radius: 8px;
            padding: 0.6rem 0.75rem; margin-bottom: 0.75rem;
        }
        .search-box svg { color: #8a7f76; flex-shrink: 0; }
        .search-box input {
            flex: 1; border: none; outline: none; background: none;
            font-size: 0.9rem; color: #1c1618;
        }
        .search-box input::placeholder { color: #b5aea6; }
        .search-count { font-size: 0.75rem; color: #8a7f76; white-space: nowrap; }
        .view-toggle {
            display: flex; gap: 0.35rem; margin-bottom: 1.25rem;
        }
        .view-btn {
            font-size: 0.75rem; padding: 0.3rem 0.65rem;
            border: 1px solid #e8e4df; border-radius: 6px;
            background: #fff; color: #8a7f76; cursor: pointer;
            transition: all 0.15s;
        }
        .view-btn.active { background: #1c1618; color: #fff; border-color: #1c1618; }
        .view-btn:hover:not(.active) { border-color: #d4883a; color: #d4883a; }
        .section-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: #8a7f76; margin: 1.5rem 0 0.5rem;
        }
        .docs-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
        .doc-card {
            background: #fff; border: 1px solid #e8e4df; border-radius: 8px;
            transition: border-color 0.15s, box-shadow 0.15s;
            overflow: hidden;
        }
        .doc-card:hover {
            border-color: #d4883a;
            box-shadow: 0 2px 8px rgba(212, 136, 58, 0.12);
        }
        .doc-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 0.75rem 1rem; cursor: pointer; gap: 0.75rem;
        }
        .doc-header-left { flex: 1; min-width: 0; }
        .doc-title-row { display: flex; align-items: baseline; gap: 0.5rem; }
        .doc-title { font-weight: 600; font-size: 0.95rem; }
        .doc-section-tag {
            font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.04em; color: #b5aea6; white-space: nowrap;
            background: #f5f3f0; padding: 0.15rem 0.4rem; border-radius: 3px;
        }
        .doc-date {
            font-size: 0.75rem; color: #8a7f76; margin-top: 0.2rem;
        }
        .doc-desc-preview {
            font-size: 0.8rem; color: #8a7f76; margin-top: 0.25rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .doc-card.expanded .doc-desc-preview { white-space: normal; }
        .doc-chevron {
            color: #b5aea6; flex-shrink: 0; margin-top: 0.2rem;
            transition: transform 0.2s;
        }
        .doc-card.expanded .doc-chevron { transform: rotate(90deg); }
        .doc-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.25s ease;
        }
        .doc-card.expanded .doc-body { max-height: 200px; }
        .doc-body-inner {
            padding: 0 1rem 0.75rem;
        }
        .doc-footer {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
        }
        .doc-file { font-size: 0.7rem; color: #b5aea6; font-family: monospace; }
        .doc-open {
            font-size: 0.75rem; color: #d4883a; text-decoration: none;
            font-weight: 600; white-space: nowrap;
        }
        .doc-open:hover { text-decoration: underline; }
        .auth-wall {
            text-align: center; padding: 4rem 1rem;
            color: #8a7f76; font-size: 0.95rem;
        }
        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <span data-site-version style="display:none;">v260414.05 1:40a</span>
    <div id="siteHeader"></div>

    <div id="authWall" class="auth-wall">
        <p>Checking access...</p>
    </div>

    <div id="mainContent" class="container hidden">
        <div class="header">
            <h1>Dev Docs</h1>
            <a href="/spaces/admin/devcontrol/" class="back-link">DevControl</a>
        </div>
        <p class="subtitle" id="docsMeta"></p>

        <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="searchInput" placeholder="Filter docs...">
            <span class="search-count" id="searchCount"></span>
        </div>

        <div class="view-toggle">
            <button class="view-btn active" data-view="chrono">Recent</button>
            <button class="view-btn" data-view="section">By Section</button>
        </div>

        <div id="docsRoot"></div>
    </div>

    <script src="/vendor/supabase-js-2.39.3.min.js"></script>
    <script type="module" src="/shared/version-info.js"></script>
    <script type="module">
        import { supabase } from '/shared/supabase.js';
        import { initAuth, getAuthState } from '/shared/auth.js';

        const DOCS = [
            // — Core Reference —
            { file: 'CHANGELOG.md', title: 'Recent Changes Changelog', section: 'Core Reference', updated: '2026-03-28', desc: 'Running log of all significant changes, migrations, and feature launches across the project.' },
            { file: 'SCHEMA.md', title: 'Database Schema Reference', section: 'Core Reference', updated: '2026-03-27', desc: 'Full Supabase schema — every table, column, type, and relationship. The source of truth for data modeling.' },
            { file: 'SONOSAUTOMATION.md', title: 'Sonos Automation — Alpaca Playhouse', section: 'Home & Devices', updated: '2026-03-31', desc: 'Sonos network config, UDM Pro settings, troubleshooting history, and best practices for 14-zone multi-room audio.' },
            { file: 'LIGHTINGAUTOMATION.md', title: 'Lighting Automation — Alpaca Playhouse', section: 'Home & Devices', updated: '2026-03-26', desc: 'Entity IDs, room commands, device inventory, color reference, and HAOS control patterns for all smart lights.' },
            { file: 'PATTERNS.md', title: 'Common Patterns & Conventions', section: 'Core Reference', updated: '2026-03-25', desc: 'Tailwind aap-* tokens, component patterns, showToast/openLightbox conventions, and UI code standards.' },
            { file: 'TESTING-GUIDE.md', title: 'Testing Guide', section: 'Core Reference', updated: '2026-03-24', desc: 'Test account credentials, auth testing workflows, QA patterns, and admin page testing procedures.' },
            { file: 'SECRETS-GUIDE.md', title: 'Secrets Management Guide', section: 'Core Reference', updated: '2026-03-24', desc: 'Bitwarden CLI setup, bw-read helper, API key storage patterns, and credential access workflows.' },
            { file: 'KEY-FILES.md', title: 'Key Files Reference', section: 'Core Reference', updated: '2026-03-22', desc: 'Index of the most important files in the repo — where to find pages, shared modules, config, and styles.' },
            { file: 'HOMEAUTOMATION.md', title: 'Home Automation — Alpaca Playhouse', section: 'Home & Devices', updated: '2026-03-21', desc: 'Comprehensive reference for all smart home devices, Home Assistant setup, Nest, cameras, and migration plans.' },
            { file: 'home-assistant-lighting-design.md', title: 'Home Assistant Unified Lighting Design', section: 'Home & Devices', updated: '2026-03-20', desc: 'Future architecture plan for unified lighting control through HAOS — entity naming, automation templates, migration status.' },
            { file: 'DEPLOY.md', title: 'Deployment Workflow', section: 'Core Reference', updated: '2026-03-19', desc: 'GitHub Pages deploy flow, CI version bumping, push protocol, and Supabase edge function deployment.' },
            { file: 'INTEGRATIONS.md', title: 'External Systems & API Cost Accounting', section: 'Core Reference', updated: '2026-03-18', desc: 'Every external API used — Stripe, Twilio, OpenAI, Gemini, Nest, Tesla — with pricing, rate limits, and usage notes.' },
            { file: 'alexa-master-pasture-skill.md', title: 'Alexa Master Pasture Lighting Skill', section: 'Home & Devices', updated: '2026-03-17', desc: 'Custom Alexa skill backend using Supabase edge function for voice-controlled lighting scenes.' },
            { file: 'LOCAL-AI-SETUP.md', title: 'Local AI Setup Guide', section: 'Infrastructure', updated: '2026-03-15', desc: 'Installing Atomic Chat + Ollama on Apple Silicon Macs. Model selection, Qwen setup, and local inference config.' },
            { file: 'music-assistant-alpaca-mac-setup.md', title: 'Music Assistant on Almaca — Setup', section: 'Home & Devices', updated: '2026-03-14', desc: 'Docker setup for Music Assistant on the Almaca Mac mini — local/hard-drive music and scheduled playback.' },
            { file: 'music-assistant-api-mapping.md', title: 'Music Assistant API Mapping', section: 'Home & Devices', updated: '2026-03-14', desc: 'Maps existing sonos-control edge function actions to Music Assistant API commands for migration.' },
            { file: 'MUSIC-ASSISTANT-EVALUATION.md', title: 'Music Assistant as Sonos Controller — Eval', section: 'Home & Devices', updated: '2026-03-13', desc: 'Evaluation of switching from node-sonos-http-api to Music Assistant as the core Sonos controller.' },
            { file: 'alpaca-mac-media-tools.md', title: 'Alpuca — Media & Video Tools Reference', section: 'Infrastructure', updated: '2026-03-12', desc: 'FFmpeg, yt-dlp, and media processing tools installed on the Alpuca Mac mini (M4).' },
            { file: 'CLAUDE-TEMPLATE.md', title: 'CLAUDE.md Templates', section: 'Core Reference', updated: '2026-03-10', desc: 'Template system for generating CLAUDE.md files per persona and feature set during setup wizard.' },
            { file: 'OPEN-BRAIN-SETUP.md', title: 'Open Brain — Supabase Setup', section: 'Infrastructure', updated: '2026-03-08', desc: 'Shared AI memory system — captures thoughts from Slack, stores as pgvector embeddings, exposes semantic search via MCP.' },
            { file: 'slack-alpaclaw-reinstall.md', title: 'Slack Alpaclaw Reinstall & Troubleshoot', section: 'Infrastructure', updated: '2026-03-06', desc: 'Steps to reinstall the Alpaclaw Slack bot after scope/event changes — workspace reinstall, event subscriptions, troubleshooting.' },
            { file: 'CAD.md', title: 'CAD & Site Plan System — Tool Reference', section: 'CAD & Property', updated: '2026-03-04', desc: 'Blender, QGIS, and PostGIS tool reference for the 3D property digital twin and site plan generation.' },
            { file: 'CAD-SITE-PLANS.md', title: 'CAD & Site Plan — Setup & Usage', section: 'CAD & Property', updated: '2026-03-04', desc: 'Generating county-permit-ready site plans for 160 Still Forest Dr using free/open-source GIS tools.' },
            { file: 'CAD-RENDER-PIPELINE.md', title: '3D Property Render Pipeline', section: 'CAD & Property', updated: '2026-03-03', desc: 'Photorealistic render pipeline for property visualization — awaiting on-site data collection.' },
            { file: 'OPENCLAW_SAFE_PARTITIONED.md', title: 'OpenClaw: Safe Environment & Partitioned', section: 'Infrastructure', updated: '2026-02-28', desc: 'Running OpenClaw in a safer, partitioned config with optional limited resident exposure.' },
            { file: 'CREDENTIALS.md', title: 'Credentials & Access (gitignored)', section: 'Core Reference', updated: '2026-02-25', desc: 'SQL credentials, SSH keys, API tokens, and service passwords. Gitignored — local only.' },
            { file: 'DEMO_MODE_FEATURE_PLAN.md', title: 'Demo Mode Feature Plan', section: 'Planning', updated: '2026-02-20', desc: 'Let invited users experience AlpacApps in demo role — see all screens but cannot modify. Sensitive data redacted with visible styling.' },
            { file: 'MULTI_TENANCY_EFFORT_ASSESSMENT.md', title: 'Multi-Tenancy Effort Assessment', section: 'Planning', updated: '2026-02-10', desc: 'Effort estimate for making AlpacApps multi-tenant — schema changes, RLS policies, UI separation, and migration plan.' },
            { file: 'AWS_VS_DIGITALOCEAN_COMPARISON.md', title: 'AWS vs DigitalOcean Comparison', section: 'Infrastructure', updated: '2026-02-05', desc: 'Cost and feature comparison for hosting workers, bots, and proxies — migration effort analysis.' },
        ];

        const SECTIONS = ['Core Reference', 'Home & Devices', 'Infrastructure', 'CAD & Property', 'Planning'];
        let currentView = 'chrono';

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function fmtDate(iso) {
            const d = new Date(iso + 'T12:00:00');
            const now = new Date();
            const diff = Math.floor((now - d) / 86400000);
            const month = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            if (diff === 0) return 'Today';
            if (diff === 1) return 'Yesterday';
            if (diff < 7) return `${diff}d ago`;
            if (diff < 30) return month;
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderCard(d) {
            return `<div class="doc-card" data-file="${esc(d.file)}">
                <div class="doc-header" onclick="toggleCard(this)">
                    <div class="doc-header-left">
                        <div class="doc-title-row">
                            <span class="doc-title">${esc(d.title)}</span>
                        </div>
                        <div class="doc-desc-preview">${esc(d.desc)}</div>
                        <div class="doc-date">${fmtDate(d.updated)} &middot; <span class="doc-section-tag">${esc(d.section)}</span></div>
                    </div>
                    <svg class="doc-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
                <div class="doc-body">
                    <div class="doc-body-inner">
                        <div class="doc-footer">
                            <span class="doc-file">${esc(d.file)}</span>
                            <a href="${esc(d.file)}" target="_blank" class="doc-open" onclick="event.stopPropagation()">Open &rarr;</a>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        window.toggleCard = function(header) {
            const card = header.closest('.doc-card');
            card.classList.toggle('expanded');
        };

        function render(filter = '') {
            const root = document.getElementById('docsRoot');
            const q = filter.toLowerCase();
            const filtered = q ? DOCS.filter(d =>
                d.title.toLowerCase().includes(q) ||
                d.file.toLowerCase().includes(q) ||
                d.desc.toLowerCase().includes(q) ||
                d.section.toLowerCase().includes(q)
            ) : DOCS;

            document.getElementById('searchCount').textContent = q ? `${filtered.length} / ${DOCS.length}` : `${DOCS.length} docs`;

            let html = '';
            if (currentView === 'chrono') {
                const sorted = [...filtered].sort((a, b) => b.updated.localeCompare(a.updated));
                html += '<ul class="docs-list">';
                for (const d of sorted) html += renderCard(d);
                html += '</ul>';
            } else {
                for (const section of SECTIONS) {
                    const items = filtered.filter(d => d.section === section);
                    if (!items.length) continue;
                    html += `<div class="section-label">${esc(section)}</div><ul class="docs-list">`;
                    for (const d of items) html += renderCard(d);
                    html += '</ul>';
                }
            }
            root.innerHTML = html || '<p style="color:#8a7f76;padding:2rem 0;">No matching docs.</p>';
        }

        async function init() {
            const wall = document.getElementById('authWall');
            const main = document.getElementById('mainContent');

            try {
                await initAuth();
                const auth = getAuthState();
                const role = auth?.appUser?.role;
                const ALLOWED = ['admin', 'staff', 'associate'];
                if (!role || !ALLOWED.includes(role)) {
                    wall.innerHTML = '<p>Access restricted to associates and above.</p><p style="margin-top:1rem;"><a href="/login/" style="color:#d4883a;">Sign in</a></p>';
                    return;
                }
                wall.classList.add('hidden');
                main.classList.remove('hidden');
                document.getElementById('docsMeta').textContent = `${DOCS.length} internal development documents`;
                render();

                document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));

                document.querySelectorAll('.view-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentView = btn.dataset.view;
                        render(document.getElementById('searchInput').value);
                    });
                });
            } catch (err) {
                wall.innerHTML = '<p>Authentication error. <a href="/login/" style="color:#d4883a;">Sign in</a></p>';
            }
        }

        init();
    </script>
</body>
</html>
