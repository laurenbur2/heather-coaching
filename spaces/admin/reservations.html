<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>

  <style>
    /* Reservations-specific styles */
    .reservations-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .reservations-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 11px;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1;
    }
    .count-badge--pending {
      background: #fef3c7;
      color: #92400e;
    }
    .filter-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .filter-tab {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .filter-tab:hover { color: var(--text); }
    .filter-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .filter-tab .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #fef3c7;
      color: #92400e;
    }
    .reservation-card {
      background: var(--bg-card);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: var(--radius-lg, 12px);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
    }
    .reservation-card__top {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .reservation-card__thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-subtle, #f0f0f0);
    }
    .reservation-card__info {
      flex: 1;
      min-width: 0;
    }
    .reservation-card__space {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.15rem;
    }
    .reservation-card__title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .reservation-card__person {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .reservation-card__datetime {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .reservation-card__notes {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.4rem;
      padding: 0.4rem 0.6rem;
      background: var(--bg-subtle, #f8f8f6);
      border-radius: 6px;
    }
    .reservation-card__admin-notes {
      font-size: 0.82rem;
      color: #92400e;
      margin-top: 0.4rem;
      padding: 0.4rem 0.6rem;
      background: #fef3c7;
      border-radius: 6px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      flex-shrink: 0;
    }
    .status-pill--pending { background: #fef3c7; color: #92400e; }
    .status-pill--approved { background: #d1fae5; color: #065f46; }
    .status-pill--denied { background: #fee2e2; color: #991b1b; }
    .reservation-card__actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-approve {
      padding: 0.35rem 0.9rem;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: #059669;
      color: #fff;
      transition: background 0.15s;
    }
    .btn-approve:hover { background: #047857; }
    .btn-deny {
      padding: 0.35rem 0.9rem;
      border: 1px solid #dc2626;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #dc2626;
      transition: background 0.15s, color 0.15s;
    }
    .btn-deny:hover { background: #dc2626; color: #fff; }
    .deny-form {
      display: none;
      margin-top: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: #fef2f2;
      border-radius: 8px;
      border: 1px solid #fecaca;
    }
    .deny-form.expanded { display: block; }
    .deny-form input {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.82rem;
      margin-bottom: 0.5rem;
      font-family: inherit;
    }
    .deny-form__buttons {
      display: flex;
      gap: 0.5rem;
    }
    .deny-form .btn-deny-confirm {
      padding: 0.3rem 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      background: #dc2626;
      color: #fff;
    }
    .deny-form .btn-deny-cancel {
      padding: 0.3rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      color: var(--text);
    }
    .conflict-warning {
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #92400e;
    }
    .conflict-warning strong {
      display: block;
      margin-bottom: 0.25rem;
    }
    .conflict-warning ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .conflict-warning li {
      margin-bottom: 0.15rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 0.75rem;
      opacity: 0.4;
    }
    .empty-state p {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

      <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/wordmark-black-transparent.png" alt="Alpaca Playhouse" class="loading-overlay__wordmark" width="28" height="28" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 28%22%3E%3Ctext x=%220%22 y=%2220%22 font-size=%2216%22 font-family=%22Arial,sans-serif%22 fill=%22%231f1720%22%3EAlpaca%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="spinner spinner--sm"></div>
  </div>

  <!-- Access denied (populated by JS) -->
  <div id="unauthorizedOverlay" class="loading-overlay hidden"></div>

  <div id="appContent" class="hidden">
    <div id="siteHeader"></div>

    <span data-site-version style="display:none">v260414.05 1:40a</span>

    <div class="context-switcher hidden" id="contextSwitcher">
      <a href="/residents/" class="context-switcher-btn">Resident</a>
      <a class="context-switcher-btn active">Staff</a>
    </div>

    <!-- Tab navigation -->
    <div class="manage-tabs">
      <!-- Tab navigation rendered by admin-shell.js -->
    </div>

    <div class="manage-container">
      <div class="manage-panel active">
        <!-- Header -->
        <div class="reservations-header">
          <h2>Space Reservations</h2>
          <span class="count-badge count-badge--pending" id="pendingCountBadge" style="display: none;">0</span>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-filter="pending">
            Pending <span class="tab-count" id="pendingTabCount" style="display: none;">0</span>

        <!-- Reservations list -->
        <div id="reservationsList"></div>

        <div id="emptyState" class="empty-state hidden">
